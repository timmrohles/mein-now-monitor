<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>mein-NOW Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  :root { --pico-spacing: 0.6rem; }
  body { max-width: 920px; margin: 1.5rem auto; padding: 0 1rem; }
  h1   { margin-bottom: 0.2rem; }
  .meta { color: var(--pico-muted-color); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .alerts { background: var(--pico-card-background-color); border-radius: 0.4rem;
            padding: 1rem 1.25rem; margin-bottom: 2rem; }
  .alert  { font-family: ui-monospace, monospace; font-size: 0.85rem; line-height: 1.5; }
  .alerts h2 { margin-top: 0; }
  details { margin-bottom: 1.4rem; }
  summary { font-weight: 600; cursor: pointer; padding: 0.5rem 0; }
  summary .total { color: var(--pico-muted-color); font-weight: 400; font-size: 0.9rem; }
  table { font-size: 0.9rem; }
  td, th { padding: 0.35rem 0.5rem; }
  td.pos { width: 2.5rem; text-align: right; color: var(--pico-muted-color); }
  td.delta { width: 4rem; font-family: ui-monospace, monospace; font-size: 0.85rem; }
  .up   { color: #1a7f37; }
  .down { color: #c93636; }
  .new  { color: #5a3eb8; font-weight: 600; }
  .anb  { color: var(--pico-muted-color); font-size: 0.85rem; }
  .ok   { color: #1a7f37; font-weight: 600; }
  .fail { color: #c93636; font-weight: 600; }
  .dim  { color: var(--pico-muted-color); }
  .thesis-group { margin-top: 0.7rem; font-weight: 600; }
  .thesis-item  { padding-left: 1.3rem; }
</style>
</head>
<body>

<h1>mein-NOW Monitor</h1>
<div class="meta" id="meta">lädt…</div>

<section class="alerts" id="alerts" hidden>
  <h2>Auffälligkeiten</h2>
  <div id="alerts-body"></div>
</section>

<section class="alerts" id="theses" hidden>
  <h2>Thesen-Belege</h2>
  <div id="theses-body"></div>
</section>

<section id="lists"></section>

<script>
const POSITION_JUMP = 5;    // gleiche Schwellen wie detect_changes.py
const TOTAL_PCT     = 0.15;
const TOP_SHOW      = 10;

async function loadData() {
  const idx = await (await fetchJson('data/index.json')).json();
  // Neue Form: "snapshots"; alte Form "dates" als Fallback während der Migration.
  const ids = idx.snapshots || idx.dates || [];
  if (!ids.length) throw new Error('Noch keine Snapshots im Repo.');
  const today = await (await fetchJson(`data/${ids[0]}.json`)).json();
  let yesterday = null;
  if (ids.length >= 2) {
    yesterday = await (await fetchJson(`data/${ids[1]}.json`)).json();
  }
  return { today, yesterday };
}

async function fetchJson(path) {
  const r = await fetch(path, { cache: 'no-cache' });
  if (!r.ok) throw new Error(`${path}: HTTP ${r.status}`);
  return r;
}

function computeAlerts(today, yesterday) {
  const jumps = [], newTop5 = [], totalShifts = [];
  if (!yesterday) return { jumps, newTop5, totalShifts };
  for (const [q, d] of Object.entries(today.queries)) {
    const old = yesterday.queries[q];
    if (!old) continue;
    if (old.total_results && d.total_results) {
      const change = (d.total_results - old.total_results) / old.total_results;
      if (Math.abs(change) >= TOTAL_PCT) {
        totalShifts.push({ q, old: old.total_results, neu: d.total_results, pct: change });
      }
    }
    const ydayMap = new Map(old.results.map(r => [r.angebot_id, r.position]));
    for (const r of d.results) {
      const op = ydayMap.get(r.angebot_id);
      if (op === undefined) {
        if (r.position <= 5) newTop5.push({ q, titel: r.titel, pos: r.position });
      } else {
        const diff = op - r.position;
        if (Math.abs(diff) >= POSITION_JUMP) {
          jumps.push({ q, titel: r.titel, oldPos: op, newPos: r.position });
        }
      }
    }
  }
  return { jumps, newTop5, totalShifts };
}

function renderAlerts(a, hasYesterday) {
  const box  = document.getElementById('alerts');
  const body = document.getElementById('alerts-body');
  box.hidden = false;
  if (!hasYesterday) {
    body.innerHTML = '<p>Noch keine Vergleichsbasis — es gibt erst einen Snapshot. Auffälligkeiten erscheinen ab dem zweiten Lauf.</p>';
    return;
  }
  const total = a.jumps.length + a.newTop5.length + a.totalShifts.length;
  if (total === 0) {
    body.innerHTML = '<p>Keine Auffälligkeiten über den Schwellen. Markt stabil.</p>';
    return;
  }
  const head = `<p><strong>${a.jumps.length}</strong> Positionssprünge · <strong>${a.newTop5.length}</strong> neue Top-5 · <strong>${a.totalShifts.length}</strong> Trefferzahl-Wechsel</p>`;
  const lines = [];
  for (const x of a.jumps) {
    const arrow = x.newPos < x.oldPos ? '▲' : '▼';
    const cls   = x.newPos < x.oldPos ? 'up' : 'down';
    lines.push(`<div class="alert"><span class="${cls}">[SPRUNG ${arrow}]</span> '${escapeHtml(x.q)}': ${escapeHtml(x.titel)} — Platz ${x.oldPos} → ${x.newPos}</div>`);
  }
  for (const x of a.newTop5) {
    lines.push(`<div class="alert"><span class="new">[NEU TOP5]</span> '${escapeHtml(x.q)}': ${escapeHtml(x.titel)} — Platz ${x.pos}</div>`);
  }
  for (const x of a.totalShifts) {
    const sign = x.pct > 0 ? '+' : '';
    lines.push(`<div class="alert">[TREFFERZAHL] '${escapeHtml(x.q)}': ${x.old} → ${x.neu} (${sign}${(x.pct*100).toFixed(0)} %)</div>`);
  }
  body.innerHTML = head + lines.join('');
}

function renderLists(today, yesterday) {
  const root = document.getElementById('lists');
  const queries = Object.keys(today.queries).sort();
  const html = [];
  for (const q of queries) {
    const d = today.queries[q];
    const old = yesterday && yesterday.queries ? yesterday.queries[q] : null;
    const ydayMap = new Map((old?.results || []).map(r => [r.angebot_id, r.position]));
    const totalLabel = d.total_results != null
      ? `${d.total_results.toLocaleString('de-DE')} Treffer` : '';
    html.push(`<details open><summary>${escapeHtml(q)} <span class="total">— ${totalLabel}</span></summary>`);
    html.push('<table><tbody>');
    for (const r of d.results.slice(0, TOP_SHOW)) {
      const op = ydayMap.get(r.angebot_id);
      let delta = '<span class="anb">·</span>';
      if (old && op === undefined)              delta = `<span class="new">NEU</span>`;
      else if (op !== undefined && op > r.position) delta = `<span class="up">▲ ${op - r.position}</span>`;
      else if (op !== undefined && op < r.position) delta = `<span class="down">▼ ${r.position - op}</span>`;
      html.push(`<tr>
        <td class="pos">${r.position}.</td>
        <td>${escapeHtml(r.titel || '')}<br><span class="anb">${escapeHtml(r.anbieter || '')}</span></td>
        <td class="delta">${delta}</td>
      </tr>`);
    }
    html.push('</tbody></table></details>');
  }
  root.innerHTML = html.join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// --- Thesen-Belege ---------------------------------------------------------
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0; }

function computeTheses(today) {
  const q = today.queries;
  const out = {};

  // T6 — Wortreihenfolge irrelevant
  if (q['KI Marketing'] && q['Marketing KI']) {
    const a = q['KI Marketing'], b = q['Marketing KI'];
    const sameTotal = a.total_results === b.total_results;
    const sameTop1  = a.results[0]?.angebot_id === b.results[0]?.angebot_id;
    out.t6 = {
      pass: sameTotal && sameTop1,
      detail: `"KI Marketing" ${a.total_results.toLocaleString('de-DE')} Treffer · "Marketing KI" ${b.total_results.toLocaleString('de-DE')} Treffer · Platz 1 ${sameTop1 ? 'identisch' : 'unterschiedlich'}`,
    };
  }

  // T7 — Klammern ignoriert
  if (q['KI Marketing'] && q['(KI) Marketing']) {
    const a = q['KI Marketing'], b = q['(KI) Marketing'];
    const sameTotal = a.total_results === b.total_results;
    const sameTop1  = a.results[0]?.angebot_id === b.results[0]?.angebot_id;
    out.t7 = {
      pass: sameTotal && sameTop1,
      detail: `"KI Marketing" ${a.total_results.toLocaleString('de-DE')} · "(KI) Marketing" ${b.total_results.toLocaleString('de-DE')} · Platz 1 ${sameTop1 ? 'identisch' : 'unterschiedlich'}`,
    };
  }

  // T2 — AND-Suche: mehr Wörter → weniger Treffer
  const chain = ['Marketing', 'KI Marketing', 'KI Marketing Manager'];
  if (chain.every(qq => q[qq])) {
    const t = chain.map(qq => q[qq].total_results);
    out.t2 = {
      pass: t[0] > t[1] && t[1] > t[2],
      detail: chain.map((qq, i) => `"${qq}" ${t[i].toLocaleString('de-DE')}`).join('  →  '),
    };
  }

  // T10 — Einwort-Suche: nackter Kurztitel gewinnt
  const single = ['Marketing', 'KI'];
  out.t10 = single.filter(qq => q[qq]).map(qq => {
    const top1 = q[qq].results[0];
    return { q: qq, titel: top1.titel, titel_len: top1.titel_len };
  });

  // T8 — Doppelkeyword-Effekt bei distinktiven Wörtern (Top-1 schaut)
  const distinctive = ['Content Marketing', 'Social Media Marketing', 'E-Commerce Marketing'];
  out.t8 = distinctive.filter(qq => q[qq]).map(qq => {
    const top1 = q[qq].results[0];
    return { q: qq, titel: top1.titel, q_words: top1.q_words_in_titel };
  });

  // T4 — Kürze hilft: Ø Titellänge Top 1–3 vs. Platz 8–10
  const sample = ['Content Marketing', 'B2B Vertrieb', 'Marketing Automation'];
  out.t4 = sample.filter(qq => q[qq] && q[qq].results.length >= 10).map(qq => {
    const rs = q[qq].results;
    const top   = avg(rs.slice(0, 3).map(r => r.titel_len));
    const unten = avg(rs.slice(7, 10).map(r => r.titel_len));
    return { q: qq, top, unten, wirkt: top < unten };
  });

  return out;
}

function renderTheses(t) {
  const box = document.getElementById('theses');
  const body = document.getElementById('theses-body');
  const lines = [];
  const mark = (ok) => ok ? '<span class="ok">✓</span>' : '<span class="fail">✗</span>';

  if (t.t6) {
    lines.push(`<div class="alert">${mark(t.t6.pass)} <strong>T6 Wortreihenfolge irrelevant</strong> — ${escapeHtml(t.t6.detail)}</div>`);
  }
  if (t.t7) {
    lines.push(`<div class="alert">${mark(t.t7.pass)} <strong>T7 Klammern ignoriert</strong> — ${escapeHtml(t.t7.detail)}</div>`);
  }
  if (t.t2) {
    lines.push(`<div class="alert">${mark(t.t2.pass)} <strong>T2 Mehr Wörter = weniger Treffer (AND-Suche)</strong> — ${escapeHtml(t.t2.detail)}</div>`);
  }

  if (t.t10 && t.t10.length) {
    lines.push(`<div class="alert thesis-group">T10 Einwort-Suche: nackter Kurztitel gewinnt</div>`);
    for (const it of t.t10) {
      const ok = it.titel_len < 20;
      lines.push(`<div class="alert thesis-item">${mark(ok)} '${escapeHtml(it.q)}' Platz 1: "${escapeHtml(it.titel)}" <span class="dim">(${it.titel_len} Zeichen)</span></div>`);
    }
  }

  if (t.t8 && t.t8.length) {
    lines.push(`<div class="alert thesis-group">T8 Doppelkeyword bei distinktiven Wörtern (Platz 1 hat das Kernwort 2×)</div>`);
    for (const it of t.t8) {
      const ok = it.q_words >= 3;
      lines.push(`<div class="alert thesis-item">${mark(ok)} '${escapeHtml(it.q)}' Platz 1: "${escapeHtml(it.titel)}" <span class="dim">(q_words_in_titel=${it.q_words})</span></div>`);
    }
  }

  if (t.t4 && t.t4.length) {
    lines.push(`<div class="alert thesis-group">T4 Kürze hilft (Ø Titellänge Top 1-3 vs. Platz 8-10)</div>`);
    for (const it of t.t4) {
      lines.push(`<div class="alert thesis-item">${mark(it.wirkt)} '${escapeHtml(it.q)}': Top1-3 ${it.top.toFixed(0)} Zeichen, Platz 8-10 ${it.unten.toFixed(0)} Zeichen</div>`);
    }
  }

  if (!lines.length) {
    body.innerHTML = '<p>Keine Kontroll-Queries im aktuellen Snapshot — Thesen-Belege erscheinen, sobald der nächste Workflow-Lauf durch ist.</p>';
  } else {
    body.innerHTML = lines.join('');
  }
  box.hidden = false;
}

(async () => {
  try {
    const { today, yesterday } = await loadData();
    const alerts = computeAlerts(today, yesterday);
    renderAlerts(alerts, !!yesterday);
    const theses = computeTheses(today);
    renderTheses(theses);
    renderLists(today, yesterday);
    document.getElementById('meta').textContent =
      `Letzter Snapshot: ${new Date(today.run_at).toLocaleString('de-DE')}`;
  } catch (e) {
    document.getElementById('meta').textContent = `Fehler: ${e.message}`;
  }
})();
</script>
</body>
</html>
