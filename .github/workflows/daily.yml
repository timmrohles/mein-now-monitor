name: Daily Snapshot

on:
  schedule:
    - cron: '0 6 * * *'    # täglich 06:00 UTC (Morgen-Lauf)
    - cron: '0 18 * * *'   # täglich 18:00 UTC (Abend-Lauf) — Volatilitäts-Sicht
  workflow_dispatch:       # erlaubt manuellen Trigger über die GH UI

permissions:
  contents: write          # damit der Job das Snapshot-JSON zurück-committen kann

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run snapshot
        run: python run_local.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%dT%H%M)"
            git push
          fi
